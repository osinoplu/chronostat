<!DOCTYPE html>
<html>
<head>
    <title>Geo-/Thermo-chronology Database of Turkiye</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.8.0/ol.css" type="text/css">
    <link rel="stylesheet" href="../basemap/map-styling.css" type="text/css">
</head>
<body>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.8.0/dist/ol.js"></script>

    <script src="../basemap/p-value-map.js"></script>

    <script>
        const countryConfig = {
            dataUrl: "turkiye-v1.0.csv",
            wmsUrl: "https://mtayenicbs-geoserver.mta.gov.tr/geoserver/wms",
            wmsLayers: "mta:PORTALFORM",
            mapCenter: [35.0, 39.0], // Longitude, Latitude
            mapZoom: 6
        };

        // Initialize the interactive map
        initPValueMap(countryConfig);
    </script>
</body>
</html>
